name: Rust standalone CI and release

on:
  push:
    tags:
      - "rust-v*"
  pull_request:
    paths:
      - "rust/**"
      - ".github/workflows/rust-standalone.yml"
      - "README.md"
      - "README.en.md"
      - "GUIDE.md"
      - "GUIDE.en.md"
  workflow_dispatch:

concurrency:
  group: rust-standalone-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  MODEL_URL: https://huggingface.co/unsloth/Ministral-3-3B-Instruct-2512-GGUF/resolve/7564922f37fa5bbb62b87f09a55c12f1f91d7a6a/Ministral-3-3B-Instruct-2512-Q4_K_M.gguf
  MODEL_FILE: Ministral-3-3B-Instruct-2512-Q4_K_M.gguf
  MODEL_SHA256: fd46fc371ff0509bfa8657ac956b7de8534d7d9baaa4947975c0648c3aa397f4

jobs:
  tests:
    name: Tests before native builds
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v5
      - name: Install Linux GUI build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libwayland-dev libx11-dev libxi-dev libxkbcommon-dev libxkbcommon-x11-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Format
        run: cargo fmt --check
      - name: Unit and integration tests
        run: cargo test --locked
      - name: Static analysis
        run: cargo clippy --locked --all-targets --features embedded-llm -- -D warnings
      - name: Telegram-only compile check
        run: cargo check --locked --no-default-features --features telegram
      - name: Embedded LLM compile check
        run: cargo check --locked --no-default-features --features embedded-llm

  build:
    name: Build ${{ matrix.name }}
    needs: tests
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: Linux x64
            platform: linux-x64
            binary: prioris
            features: embedded-llm
            extension: .tar.gz
          - os: windows-2022
            name: Windows x64
            platform: windows-x64
            binary: prioris.exe
            features: embedded-llm
            extension: .zip
          - os: macos-15
            name: macOS arm64
            platform: macos-arm64
            binary: prioris
            features: embedded-llm,accelerate
            extension: .zip
    runs-on: ${{ matrix.os }}
    env:
      BUNDLE_NAME: prioris-${{ github.ref_name }}-${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5
      - name: Install Linux GUI build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libwayland-dev libx11-dev libxi-dev libxkbcommon-dev libxkbcommon-x11-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Detect Apple release credentials
        id: apple-creds
        if: startsWith(github.ref, 'refs/tags/rust-v') && runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          present=0
          for name in \
            APPLE_CERTIFICATE_P12_BASE64 \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_ID \
            APPLE_TEAM_ID \
            APPLE_APP_SPECIFIC_PASSWORD
          do
            value="${!name:-}"
            if [ -n "$value" ]; then
              present=$((present + 1))
            fi
          done
          if [ "$present" -eq 0 ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "No Apple credentials: the release will be signed ad hoc."
          elif [ "$present" -eq 6 ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Apple credentials found: Developer ID signing and notarization enabled."
          else
            echo "Partial Apple credential set ($present/6). Configure all six secrets or remove all of them." >&2
            exit 1
          fi
      - name: Build optimized native binary
        working-directory: rust
        run: cargo build --locked --release --features "${{ matrix.features }}"
      - name: Post-build executable self-test
        if: runner.os != 'Windows'
        run: ./rust/target/release/${{ matrix.binary }} --self-test
      - name: Post-build executable self-test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\rust\target\release\${{ matrix.binary }} --self-test

      # Official rust-v* releases are signed and notarized below. For PRs and
      # workflow_dispatch (no Apple credentials required), this
      # ad-hoc Hardened Runtime signature is the only one applied: macOS will
      # show a one-time "unidentified developer" warning that the user can
      # dismiss via System Settings > Privacy & Security > Allow Anyway.
      - name: Ad-hoc sign macOS binary (non-release builds)
        if: runner.os == 'macOS' && !startsWith(github.ref, 'refs/tags/rust-v')
        run: |
          codesign --force --sign - --options runtime --timestamp=none \
            "rust/target/release/${{ matrix.binary }}"
          codesign --verify --verbose "rust/target/release/${{ matrix.binary }}"

      - name: Package ad-hoc signed binary for dev testing (workflow_dispatch)
        if: runner.os == 'macOS' && github.event_name == 'workflow_dispatch'
        run: |
          mkdir -p dev-bundle-macos
          cp "rust/target/release/${{ matrix.binary }}" dev-bundle-macos/
          cp rust/config.example.toml dev-bundle-macos/config.toml
          cp rust/OUVRIR-MACOS.md dev-bundle-macos/
          ditto -c -k --keepParent dev-bundle-macos prioris-dev-macos-arm64.zip

      - name: Upload dev macOS artifact (workflow_dispatch only)
        if: runner.os == 'macOS' && github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: prioris-dev-macos-arm64
          path: prioris-dev-macos-arm64.zip
          retention-days: 7

      - name: Prepare release bundle (Unix)
        if: startsWith(github.ref, 'refs/tags/rust-v') && runner.os != 'Windows'
        run: |
          mkdir -p "bundle/$BUNDLE_NAME/models" "bundle/$BUNDLE_NAME/scripts"
          cp "rust/target/release/${{ matrix.binary }}" "bundle/$BUNDLE_NAME/"
          cp rust/config.example.toml "bundle/$BUNDLE_NAME/config.toml"
          cp rust/README.md "bundle/$BUNDLE_NAME/README.md"
          cp README.md "bundle/$BUNDLE_NAME/README-python.md"
          cp README.en.md GUIDE.md GUIDE.en.md "bundle/$BUNDLE_NAME/"
          cp -R ObsidianVault "bundle/$BUNDLE_NAME/"
          cp rust/scripts/run.sh rust/scripts/self-test.sh "bundle/$BUNDLE_NAME/scripts/"
          chmod +x "bundle/$BUNDLE_NAME/${{ matrix.binary }}" "bundle/$BUNDLE_NAME/scripts/"*.sh
          printf '%s\n' "${GITHUB_REF_NAME#rust-}" > "bundle/$BUNDLE_NAME/VERSION.txt"
          curl -L --fail --retry 3 --retry-delay 5 "$MODEL_URL" -o "bundle/$BUNDLE_NAME/models/$MODEL_FILE"
          if command -v sha256sum >/dev/null 2>&1; then
            echo "$MODEL_SHA256  bundle/$BUNDLE_NAME/models/$MODEL_FILE" | sha256sum -c -
          else
            echo "$MODEL_SHA256  bundle/$BUNDLE_NAME/models/$MODEL_FILE" | shasum -a 256 -c -
          fi
      - name: Prepare release bundle (Windows)
        if: startsWith(github.ref, 'refs/tags/rust-v') && runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "bundle/$env:BUNDLE_NAME/models", "bundle/$env:BUNDLE_NAME/scripts" | Out-Null
          Copy-Item "rust/target/release/${{ matrix.binary }}" "bundle/$env:BUNDLE_NAME/"
          Copy-Item "rust/config.example.toml" "bundle/$env:BUNDLE_NAME/config.toml"
          Copy-Item "rust/README.md" "bundle/$env:BUNDLE_NAME/README.md"
          Copy-Item "README.md" "bundle/$env:BUNDLE_NAME/README-python.md"
          Copy-Item "README.en.md", "GUIDE.md", "GUIDE.en.md" "bundle/$env:BUNDLE_NAME/"
          Copy-Item -Recurse "ObsidianVault" "bundle/$env:BUNDLE_NAME/"
          Copy-Item "rust/scripts/run.ps1", "rust/scripts/self-test.ps1" "bundle/$env:BUNDLE_NAME/scripts/"
          ($env:GITHUB_REF_NAME -replace '^rust-', '') | Set-Content "bundle/$env:BUNDLE_NAME/VERSION.txt"
          curl.exe -L --fail --retry 3 --retry-delay 5 $env:MODEL_URL -o "bundle/$env:BUNDLE_NAME/models/$env:MODEL_FILE"
          $actual = (Get-FileHash "bundle/$env:BUNDLE_NAME/models/$env:MODEL_FILE" -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne $env:MODEL_SHA256) { throw "Model SHA256 mismatch: $actual" }

      - name: Create macOS application bundle
        if: startsWith(github.ref, 'refs/tags/rust-v') && runner.os == 'macOS'
        run: |
          app="bundle/$BUNDLE_NAME/PRIORIS.app"
          mkdir -p "$app/Contents/MacOS"
          mv "bundle/$BUNDLE_NAME/${{ matrix.binary }}" "$app/Contents/MacOS/prioris"
          version="${GITHUB_REF_NAME#rust-v}"
          cat > "$app/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key><string>fr</string>
            <key>CFBundleDisplayName</key><string>PRIORIS</string>
            <key>CFBundleExecutable</key><string>prioris</string>
            <key>CFBundleIdentifier</key><string>io.github.krl91.prioris</string>
            <key>CFBundleInfoDictionaryVersion</key><string>6.0</string>
            <key>CFBundleName</key><string>PRIORIS</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleShortVersionString</key><string>$version</string>
            <key>CFBundleVersion</key><string>$GITHUB_RUN_NUMBER</string>
            <key>LSMinimumSystemVersion</key><string>13.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST
          plutil -lint "$app/Contents/Info.plist"
          test -x "$app/Contents/MacOS/prioris"
      - name: Import Apple Developer ID certificate
        if: startsWith(github.ref, 'refs/tags/rust-v') && runner.os == 'macOS' && steps.apple-creds.outputs.available == 'true'
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          certificate="$RUNNER_TEMP/apple-developer-id.p12"
          keychain="$RUNNER_TEMP/prioris-signing.keychain-db"
          keychain_password="$(openssl rand -hex 24)"
          printf '%s' "$APPLE_CERTIFICATE_P12_BASE64" | base64 -D > "$certificate"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$certificate" -k "$keychain" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain"
          security list-keychains -d user -s "$keychain"
          security find-identity -v -p codesigning "$keychain" | grep -F "$APPLE_SIGNING_IDENTITY"
          echo "APPLE_KEYCHAIN_PATH=$keychain" >> "$GITHUB_ENV"
      - name: Sign macOS application with Developer ID
        if: startsWith(github.ref, 'refs/tags/rust-v') && runner.os == 'macOS' && steps.apple-creds.outputs.available == 'true'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          app="bundle/$BUNDLE_NAME/PRIORIS.app"
          codesign --force --sign "$APPLE_SIGNING_IDENTITY" --keychain "$APPLE_KEYCHAIN_PATH" \
            --options runtime --timestamp "$app/Contents/MacOS/prioris"
          codesign --force --sign "$APPLE_SIGNING_IDENTITY" --keychain "$APPLE_KEYCHAIN_PATH" \
            --options runtime --timestamp "$app"
          codesign --verify --deep --strict --verbose=2 "$app"
          codesign -dv --verbose=4 "$app" 2>&1 | grep -F "Authority=Developer ID Application:"
      - name: Ad-hoc sign macOS application without Apple credentials
        if: startsWith(github.ref, 'refs/tags/rust-v') && runner.os == 'macOS' && steps.apple-creds.outputs.available == 'false'
        run: |
          app="bundle/$BUNDLE_NAME/PRIORIS.app"
          codesign --force --sign - --options runtime --timestamp=none "$app/Contents/MacOS/prioris"
          codesign --force --sign - --options runtime --timestamp=none "$app"
          codesign --verify --deep --strict --verbose=2 "$app"
          codesign -dv --verbose=4 "$app" 2>&1 | grep -F "Signature=adhoc"
          cp rust/OUVRIR-MACOS.md "bundle/$BUNDLE_NAME/"
      - name: Notarize and staple macOS application
        if: startsWith(github.ref, 'refs/tags/rust-v') && runner.os == 'macOS' && steps.apple-creds.outputs.available == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          app="bundle/$BUNDLE_NAME/PRIORIS.app"
          submission="$RUNNER_TEMP/PRIORIS-notarization.zip"
          ditto -c -k --keepParent "$app" "$submission"
          xcrun notarytool submit "$submission" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait --timeout 30m
          xcrun stapler staple "$app"
          xcrun stapler validate "$app"
          spctl --assess --type execute --verbose=4 "$app"
      - name: Verify bundled LLM (Unix)
        if: startsWith(github.ref, 'refs/tags/rust-v') && runner.os != 'Windows'
        run: |
          cd "bundle/$BUNDLE_NAME"
          if [ "$RUNNER_OS" = "macOS" ]; then
            executable="PRIORIS.app/Contents/MacOS/prioris"
          else
            executable="./${{ matrix.binary }}"
          fi
          "$executable" --llm-smoke "models/$MODEL_FILE"
      - name: Verify bundled LLM (Windows)
        if: startsWith(github.ref, 'refs/tags/rust-v') && runner.os == 'Windows'
        shell: pwsh
        run: Set-Location "bundle/$env:BUNDLE_NAME"; .\${{ matrix.binary }} --llm-smoke "models/$env:MODEL_FILE"

      - name: Package Linux
        if: startsWith(github.ref, 'refs/tags/rust-v') && runner.os == 'Linux'
        run: tar -czf "$BUNDLE_NAME.tar.gz" -C bundle "$BUNDLE_NAME"
      - name: Package macOS
        if: startsWith(github.ref, 'refs/tags/rust-v') && runner.os == 'macOS'
        run: ditto -c -k --keepParent "bundle/$BUNDLE_NAME" "$BUNDLE_NAME.zip"
      - name: Package Windows
        if: startsWith(github.ref, 'refs/tags/rust-v') && runner.os == 'Windows'
        shell: pwsh
        run: 7z a -tzip "$env:BUNDLE_NAME.zip" "bundle/$env:BUNDLE_NAME"
      - name: Upload release archive
        if: startsWith(github.ref, 'refs/tags/rust-v')
        uses: actions/upload-artifact@v4
        with:
          name: rust-release-${{ matrix.platform }}
          path: ${{ env.BUNDLE_NAME }}${{ matrix.extension }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 3
      - name: Remove temporary Apple signing keychain
        if: always() && startsWith(github.ref, 'refs/tags/rust-v') && runner.os == 'macOS' && steps.apple-creds.outputs.available == 'true'
        run: |
          if [ -n "${APPLE_KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "$APPLE_KEYCHAIN_PATH" || true
          fi
          rm -f "$RUNNER_TEMP/apple-developer-id.p12" "$RUNNER_TEMP/PRIORIS-notarization.zip"

  release:
    name: Publish separate Rust release
    if: startsWith(github.ref, 'refs/tags/rust-v')
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          pattern: rust-release-*
          path: dist
          merge-multiple: true
      - name: Generate checksums and release notes
        run: |
          cd dist
          sha256sum prioris-rust-v* > SHA256SUMS.txt
          cd ..
          version="${GITHUB_REF_NAME#rust-}"
          echo "RELEASE_NAME=PRIORIS Rust $version" >> "$GITHUB_ENV"
          cp .github/release-notes/rust-latest.md release-notes.md
          sed -i "s/__VERSION__/$version/g; s/__TAG__/$GITHUB_REF_NAME/g; s|__REPOSITORY__|$GITHUB_REPOSITORY|g" release-notes.md
      - name: Create Rust GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ env.RELEASE_NAME }}
          body_path: release-notes.md
          files: dist/*
          fail_on_unmatched_files: true
          prerelease: true
          make_latest: false
