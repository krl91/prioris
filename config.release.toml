# PRIORIS release configuration.
# Default mode: local GUI + bundled Ministral 3B GGUF + bundled llama-simple.

[telegram]
token = ""

[database]
path = "prioris.db"

[ui]
language = "fr"

[obsidian]
vault_path = "ObsidianVault"
prioris_dir = "PRIORIS"

[llm]
enabled = true
provider = "local_gguf"
runner_path = "auto"
model = "models/Ministral-3-3B-Instruct-2512-Q4_K_M.gguf"
max_tokens = 512
timeout_s = 120
api_key = ""
api_key_env = ""
base_url = ""
keep_warm = true
keep_warm_interval_min = 4
