name: Build release runtimes

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

env:
  LLAMA_CPP_REF: b10012
  MODEL_3B_URL: https://huggingface.co/unsloth/Ministral-3-3B-Instruct-2512-GGUF/resolve/7564922f37fa5bbb62b87f09a55c12f1f91d7a6a/Ministral-3-3B-Instruct-2512-Q4_K_M.gguf
  MODEL_3B_FILE: Ministral-3-3B-Instruct-2512-Q4_K_M.gguf

jobs:
  tests:
    name: Tests before release build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout PRIORIS
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

  release-notes:
    name: Update release notes
    runs-on: ubuntu-24.04
    needs: tests
    if: github.event_name == 'release'
    steps:
      - name: Checkout PRIORIS
        uses: actions/checkout@v4

      - name: Prepare release notes
        run: |
          sed "s/^# PRIORIS .*/# PRIORIS ${{ github.event.release.tag_name }}/" \
            .github/release-notes/latest.md > release-notes.md

      - name: Update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api --method PATCH "repos/${{ github.repository }}/releases/${{ github.event.release.id }}" -F body=@release-notes.md

  obsidian-vault:
    name: Obsidian vault asset
    runs-on: ubuntu-24.04
    needs: tests
    steps:
      - name: Checkout PRIORIS
        uses: actions/checkout@v4

      - name: Package Obsidian vault
        run: zip -r ObsidianVault.zip ObsidianVault -x '**/.DS_Store'

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ObsidianVault
          path: ObsidianVault.zip

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ObsidianVault.zip

  linux-x64:
    name: Linux x64 runtime
    runs-on: ubuntu-24.04
    needs: tests
    steps:
      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/llama.cpp
          ref: ${{ env.LLAMA_CPP_REF }}
          path: llama.cpp

      - name: Checkout PRIORIS
        uses: actions/checkout@v4
        with:
          path: app

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build build-essential

      - name: Configure
        run: >
          cmake -S llama.cpp -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DGGML_NATIVE=OFF
          -DLLAMA_OPENSSL=OFF
          -DLLAMA_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --config Release --target llama-simple --parallel 3

      - name: Package
        run: |
          mkdir -p runtime/linux-x64
          cp llama.cpp/LICENSE runtime/linux-x64/
          cp build/bin/llama-simple runtime/linux-x64/
          find build/bin -maxdepth 1 -type f \( -name "*.so" -o -name "*.so.*" \) -exec cp {} runtime/linux-x64/ \;
          ! find runtime/linux-x64 -type f \( -name "*server*" -o -name "*rpc*" -o -name "llama-cli*" \) | grep .
          tar -czf runtime-linux-x64.tar.gz -C runtime linux-x64

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: runtime-linux-x64
          path: runtime-linux-x64.tar.gz

      - name: Build app bundle
        run: |
          mkdir -p bundle/prioris-linux-x64/runtime bundle/prioris-linux-x64/models bundle/prioris-linux-x64/rust
          cp -R app/prioris app/tests app/ObsidianVault app/scripts bundle/prioris-linux-x64/
          cp app/pyproject.toml app/README.md app/README.en.md app/GUIDE.md app/GUIDE.en.md app/config.example.toml bundle/prioris-linux-x64/
          cp app/rust/README.md bundle/prioris-linux-x64/rust/README.md
          cp app/config.release.toml bundle/prioris-linux-x64/config.toml
          cp -R runtime/linux-x64 bundle/prioris-linux-x64/runtime/
          curl -L --retry 3 --retry-delay 5 "$MODEL_3B_URL" -o "bundle/prioris-linux-x64/models/$MODEL_3B_FILE"
          cat > bundle/prioris-linux-x64/models/README.md <<'EOF'
          Bundled default model:
          Ministral-3-3B-Instruct-2512-Q4_K_M.gguf
          EOF
          chmod +x bundle/prioris-linux-x64/scripts/install_unix.sh bundle/prioris-linux-x64/scripts/run_unix.sh
          python3 -m pip download -d bundle/prioris-linux-x64/wheelhouse "python-telegram-bot>=21" "setuptools>=40.8.0" wheel "pytest>=8"
          tar -czf prioris-linux-x64.tar.gz -C bundle prioris-linux-x64

      - name: Verify app bundle
        run: |
          test -f prioris-linux-x64.tar.gz
          tar -tzf prioris-linux-x64.tar.gz | grep -F "prioris-linux-x64/config.toml"
          tar -tzf prioris-linux-x64.tar.gz | grep -F "prioris-linux-x64/tests/"
          tar -tzf prioris-linux-x64.tar.gz | grep -F "prioris-linux-x64/rust/README.md"
          tar -tzf prioris-linux-x64.tar.gz | grep -F "prioris-linux-x64/ObsidianVault/"
          tar -tzf prioris-linux-x64.tar.gz | grep -F "prioris-linux-x64/runtime/linux-x64/llama-simple"
          tar -tzf prioris-linux-x64.tar.gz | grep -F "prioris-linux-x64/models/$MODEL_3B_FILE"
          ! tar -tzf prioris-linux-x64.tar.gz | grep -E "llama-server|ggml-rpc-server|llama-cli"
          rm -rf verify-linux
          mkdir verify-linux
          tar -xzf prioris-linux-x64.tar.gz -C verify-linux
          cd verify-linux/prioris-linux-x64
          python3 -m venv .venv
          .venv/bin/python -m pip install --no-index --find-links wheelhouse -e ".[dev]"
          .venv/bin/python -m pytest
          .venv/bin/python -c "import pathlib, tomllib; from prioris.llm.client import LLMConfig, _local_gguf_paths; cfg=tomllib.loads(pathlib.Path('config.toml').read_text('utf-8')); assert cfg['telegram']['token'] == ''; assert cfg['llm']['enabled'] is True; assert cfg['llm']['provider'] == 'local_gguf'; assert cfg['llm']['model'] == 'models/Ministral-3-3B-Instruct-2512-Q4_K_M.gguf'; runner, model = _local_gguf_paths(LLMConfig.from_dict(cfg['llm'])); assert pathlib.Path(runner).as_posix() == 'runtime/linux-x64/llama-simple'; assert pathlib.Path(runner).exists(); assert pathlib.Path(model).exists(); assert pathlib.Path('ObsidianVault').is_dir()"
          .venv/bin/python scripts/smoke_challenge_llm.py config.toml

      - name: Upload app bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: prioris-linux-x64
          path: prioris-linux-x64.tar.gz

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            runtime-linux-x64.tar.gz
            prioris-linux-x64.tar.gz

  macos-arm64:
    name: macOS arm64 runtime
    runs-on: macos-14
    needs: tests
    steps:
      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/llama.cpp
          ref: ${{ env.LLAMA_CPP_REF }}
          path: llama.cpp

      - name: Checkout PRIORIS
        uses: actions/checkout@v4
        with:
          path: app

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure
        run: >
          cmake -S llama.cpp -B build
          -DCMAKE_BUILD_TYPE=Release
          -DGGML_NATIVE=OFF
          -DLLAMA_OPENSSL=OFF
          -DLLAMA_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --config Release --target llama-simple --parallel 3

      - name: Package
        run: |
          mkdir -p runtime/macos-arm64
          cp llama.cpp/LICENSE runtime/macos-arm64/
          cp build/bin/llama-simple runtime/macos-arm64/
          find build/bin -maxdepth 1 \( -type f -o -type l \) -name "*.dylib" -exec cp -P {} runtime/macos-arm64/ \;
          ! find runtime/macos-arm64 -type f \( -name "*server*" -o -name "*rpc*" -o -name "llama-cli*" \) | grep .
          # Fix rpath: the binary embeds the CI build dir as @rpath, which does not
          # exist on the user's machine. Add @executable_path so dyld finds the
          # dylibs in the same directory as llama-simple after extraction.
          install_name_tool -add_rpath @executable_path runtime/macos-arm64/llama-simple
          # Sign the main executable with Hardened Runtime so macOS Gatekeeper
          # treats it as "unidentified developer" (bypassable) rather than
          # "potential malware" (not bypassable) on macOS 14+ Sonoma / 15+ Sequoia.
          # The disable-library-validation entitlement is required because Hardened
          # Runtime enforces matching Team IDs on loaded dylibs; since all binaries
          # here are ad-hoc signed (Team ID = null), each has its own identity and
          # strict validation would reject libllama.0.dylib.
          cat > /tmp/llama-entitlements.plist << 'ENTS_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.cs.disable-library-validation</key>
              <true/>
          </dict>
          </plist>
          ENTS_EOF
          codesign --force --sign - --options runtime --entitlements /tmp/llama-entitlements.plist --timestamp=none runtime/macos-arm64/llama-simple
          find runtime/macos-arm64 -maxdepth 1 \( -type f -o -type l \) -name "*.dylib" -exec codesign --force --sign - --timestamp=none {} \;
          codesign --verify --verbose runtime/macos-arm64/llama-simple
          otool -l runtime/macos-arm64/llama-simple | grep -A2 LC_RPATH | grep path | grep '@executable_path'
          codesign -dv --entitlements - runtime/macos-arm64/llama-simple | grep -q 'disable-library-validation'
          # Helper script so users who download only the runtime zip can bypass
          # Gatekeeper with a single command instead of going through System Settings.
          cat > runtime/macos-arm64/allow-macos.sh << 'ALLOW_EOF'
          #!/bin/sh
          # Run once after downloading to let macOS execute llama-simple.
          # Removes the quarantine attribute macOS sets on downloaded files.
          #
          # Usage:  chmod +x allow-macos.sh && ./allow-macos.sh
          xattr -dr com.apple.quarantine "$(dirname "$0")"
          echo "Done – llama-simple is now allowed to run."
          ALLOW_EOF
          chmod +x runtime/macos-arm64/allow-macos.sh
          (cd runtime && zip -r ../runtime-macos-arm64.zip macos-arm64)

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: runtime-macos-arm64
          path: runtime-macos-arm64.zip

      - name: Build app bundle
        run: |
          mkdir -p bundle/prioris-macos-arm64/runtime bundle/prioris-macos-arm64/models bundle/prioris-macos-arm64/rust
          cp -R app/prioris app/tests app/ObsidianVault app/scripts bundle/prioris-macos-arm64/
          cp app/pyproject.toml app/README.md app/README.en.md app/GUIDE.md app/GUIDE.en.md app/config.example.toml bundle/prioris-macos-arm64/
          cp app/rust/README.md bundle/prioris-macos-arm64/rust/README.md
          cp app/config.release.toml bundle/prioris-macos-arm64/config.toml
          cp -R runtime/macos-arm64 bundle/prioris-macos-arm64/runtime/
          find bundle/prioris-macos-arm64/runtime/macos-arm64 -type f \( -name "llama-simple" -o -name "*.dylib" \) -exec codesign --verify --verbose {} \;
          curl -L --retry 3 --retry-delay 5 "$MODEL_3B_URL" -o "bundle/prioris-macos-arm64/models/$MODEL_3B_FILE"
          cat > bundle/prioris-macos-arm64/models/README.md <<'EOF'
          Bundled default model:
          Ministral-3-3B-Instruct-2512-Q4_K_M.gguf
          EOF
          chmod +x bundle/prioris-macos-arm64/scripts/install_unix.sh bundle/prioris-macos-arm64/scripts/run_unix.sh
          python3 -m pip download -d bundle/prioris-macos-arm64/wheelhouse "python-telegram-bot>=21" "setuptools>=40.8.0" wheel "pytest>=8"
          (cd bundle && zip -r ../prioris-macos-arm64.zip prioris-macos-arm64)

      - name: Verify app bundle
        run: |
          test -f prioris-macos-arm64.zip
          unzip -l prioris-macos-arm64.zip | grep -F "prioris-macos-arm64/config.toml"
          unzip -l prioris-macos-arm64.zip | grep -F "prioris-macos-arm64/tests/"
          unzip -l prioris-macos-arm64.zip | grep -F "prioris-macos-arm64/rust/README.md"
          unzip -l prioris-macos-arm64.zip | grep -F "prioris-macos-arm64/ObsidianVault/"
          unzip -l prioris-macos-arm64.zip | grep -F "prioris-macos-arm64/runtime/macos-arm64/llama-simple"
          unzip -l prioris-macos-arm64.zip | grep -F "prioris-macos-arm64/models/$MODEL_3B_FILE"
          ! unzip -l prioris-macos-arm64.zip | grep -E "llama-server|ggml-rpc-server|llama-cli"
          rm -rf verify-macos
          mkdir verify-macos
          unzip -q prioris-macos-arm64.zip -d verify-macos
          cd verify-macos/prioris-macos-arm64
          xattr -w com.apple.quarantine "0081;00000000;GitHub Actions;PRIORIS" runtime/macos-arm64/llama-simple
          ./scripts/install_unix.sh
          ! xattr -p com.apple.quarantine runtime/macos-arm64/llama-simple
          .venv/bin/python -m pytest
          .venv/bin/python -c "import pathlib, tomllib; from prioris.llm.client import LLMConfig, _local_gguf_paths; cfg=tomllib.loads(pathlib.Path('config.toml').read_text('utf-8')); assert cfg['telegram']['token'] == ''; assert cfg['llm']['enabled'] is True; assert cfg['llm']['provider'] == 'local_gguf'; assert cfg['llm']['model'] == 'models/Ministral-3-3B-Instruct-2512-Q4_K_M.gguf'; runner, model = _local_gguf_paths(LLMConfig.from_dict(cfg['llm'])); assert pathlib.Path(runner).as_posix() == 'runtime/macos-arm64/llama-simple'; assert pathlib.Path(runner).exists(); assert pathlib.Path(model).exists(); assert pathlib.Path('ObsidianVault').is_dir()"
          .venv/bin/python scripts/smoke_challenge_llm.py config.toml

      - name: Upload app bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: prioris-macos-arm64
          path: prioris-macos-arm64.zip

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            runtime-macos-arm64.zip
            prioris-macos-arm64.zip

  windows-x64:
    name: Windows x64 runtime
    runs-on: windows-2022
    needs: tests
    steps:
      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/llama.cpp
          ref: ${{ env.LLAMA_CPP_REF }}
          path: llama.cpp

      - name: Checkout PRIORIS
        uses: actions/checkout@v4
        with:
          path: app

      - name: Configure
        shell: pwsh
        run: >
          cmake -S llama.cpp -B build
          -A x64
          -DCMAKE_BUILD_TYPE=Release
          -DGGML_NATIVE=OFF
          -DLLAMA_OPENSSL=OFF
          -DLLAMA_BUILD_TESTS=OFF

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --target llama-simple --parallel 3

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force runtime/windows-x64 | Out-Null
          Copy-Item build/bin/Release/llama-simple.exe -Destination runtime/windows-x64 -Force
          Get-ChildItem build/bin/Release -File -Include *.dll |
            Copy-Item -Destination runtime/windows-x64 -Force
          $forbidden = Get-ChildItem runtime/windows-x64 -File |
            Where-Object { $_.Name -match 'server|rpc|llama-cli' }
          if ($forbidden) {
            $forbidden | ForEach-Object { Write-Error "Forbidden server/runtime file packaged: $($_.Name)" }
            exit 1
          }
          Compress-Archive -Path runtime/windows-x64 -DestinationPath runtime-windows-x64.zip -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: runtime-windows-x64
          path: runtime-windows-x64.zip

      - name: Build app bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force bundle/prioris-windows-x64/runtime | Out-Null
          New-Item -ItemType Directory -Force bundle/prioris-windows-x64/models | Out-Null
          New-Item -ItemType Directory -Force bundle/prioris-windows-x64/rust | Out-Null
          Copy-Item app/prioris, app/tests, app/ObsidianVault, app/scripts -Destination bundle/prioris-windows-x64 -Recurse
          Copy-Item app/pyproject.toml, app/README.md, app/README.en.md, app/GUIDE.md, app/GUIDE.en.md, app/config.example.toml -Destination bundle/prioris-windows-x64
          Copy-Item app/rust/README.md -Destination bundle/prioris-windows-x64/rust/README.md
          Copy-Item app/config.release.toml -Destination bundle/prioris-windows-x64/config.toml
          Copy-Item runtime/windows-x64 -Destination bundle/prioris-windows-x64/runtime -Recurse
          Invoke-WebRequest -Uri $env:MODEL_3B_URL -OutFile "bundle/prioris-windows-x64/models/$env:MODEL_3B_FILE"
          @"
          Bundled default model:
          Ministral-3-3B-Instruct-2512-Q4_K_M.gguf
          "@ | Set-Content bundle/prioris-windows-x64/models/README.md
          py -3.11 -m pip download -d bundle/prioris-windows-x64/wheelhouse "python-telegram-bot>=21" "setuptools>=40.8.0" wheel "pytest>=8"
          Compress-Archive -Path bundle/prioris-windows-x64 -DestinationPath prioris-windows-x64.zip -Force

      - name: Verify app bundle
        shell: pwsh
        run: |
          if (!(Test-Path prioris-windows-x64.zip)) { throw "Missing prioris-windows-x64.zip" }
          $entries = (tar -tf prioris-windows-x64.zip) -replace '\\','/'
          foreach ($required in @(
            "prioris-windows-x64/config.toml",
            "prioris-windows-x64/tests/",
            "prioris-windows-x64/rust/README.md",
            "prioris-windows-x64/ObsidianVault/",
            "prioris-windows-x64/runtime/windows-x64/llama-simple.exe",
            "prioris-windows-x64/models/$env:MODEL_3B_FILE"
          )) {
            if (!($entries | Where-Object { $_ -like "$required*" })) {
              throw "Missing bundle entry: $required"
            }
          }
          $forbidden = $entries | Where-Object { $_ -match 'llama-server|ggml-rpc-server|llama-cli' }
          if ($forbidden) {
            $forbidden | ForEach-Object { Write-Error "Forbidden server/runtime file packaged: $_" }
            exit 1
          }
          Remove-Item -Recurse -Force verify-windows -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force verify-windows | Out-Null
          tar -xf prioris-windows-x64.zip -C verify-windows
          Set-Location verify-windows/prioris-windows-x64
          py -3.11 -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --no-index --find-links wheelhouse -e ".[dev]"
          .\.venv\Scripts\python.exe -m pytest
          .\.venv\Scripts\python.exe -c "import pathlib, tomllib; from prioris.llm.client import LLMConfig, _local_gguf_paths; cfg=tomllib.loads(pathlib.Path('config.toml').read_text('utf-8')); assert cfg['telegram']['token'] == ''; assert cfg['llm']['enabled'] is True; assert cfg['llm']['provider'] == 'local_gguf'; assert cfg['llm']['model'] == 'models/Ministral-3-3B-Instruct-2512-Q4_K_M.gguf'; runner, model = _local_gguf_paths(LLMConfig.from_dict(cfg['llm'])); assert pathlib.Path(runner).as_posix() == 'runtime/windows-x64/llama-simple.exe'; assert pathlib.Path(runner).exists(); assert pathlib.Path(model).exists(); assert pathlib.Path('ObsidianVault').is_dir()"
          .\.venv\Scripts\python.exe scripts/smoke_challenge_llm.py config.toml

      - name: Upload app bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: prioris-windows-x64
          path: prioris-windows-x64.zip

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            runtime-windows-x64.zip
            prioris-windows-x64.zip
